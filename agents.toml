# User-wide Pandora's Box manifest partial.
# Bundled Agent prompts stay fixed; this file selects user-owned harnesses and thin policies.
# Validate rendering with `pandora-spawn preview` before reopening the box.

#: policies {{{

[policies.pandora-workflow]
files = ["policies/pandora/workflow.md"]

[policies.toil-workflow]
files = ["policies/toil/workflow.md"]

[policies.greed-workflow]
files = ["policies/greed/workflow.md"]

[policies.war-workflow]
files = ["policies/war/workflow.md"]

[policies.envy-workflow]
files = ["policies/envy/workflow.md"]

# Work-private overlays. `allow_empty = true` lets this personal repo render on
# machines where the private workfiles checkout is absent, while still loading
# the policies on the work machine.
[policies.work-perkbox]
allow_empty = true
files = ["/Users/adamhall/work/me/workfiles/pdx/policies/shared/perkbox.md"]

[policies.work-repo-default-branch-guard]
allow_empty = true
files = ["/Users/adamhall/work/me/workfiles/pdx/policies/shared/repo-default-branch-guard.md"]

[policies.work-envy-glab-triage]
allow_empty = true
files = ["/Users/adamhall/work/me/workfiles/pdx/policies/envy/glab-triage-label.md"]

#: }}}
#: agents {{{

[agents.pandora.policy]
add = ["pandora-workflow"]

[agents.toil.policy]
add = ["toil-workflow"]

[agents.greed.policy]
add = ["greed-workflow"]

[agents.war.policy]
add = ["war-workflow"]

[agents.envy.policy]
add = ["envy-workflow"]

[agents.pandora.harness]
kind = "pi"
model = "openai-codex/gpt-5.5:low"
# model = "deepseek/deepseek-v4-pro"
system_prompt_mode = "replace"
tools.add = ["bash", "read"]
argv.add = [
  "--name", "Pandora",
  "--agent", "main",
  "--emote", "aza_choi",
  "--skill", "$PDX_USER_DATA_DIR/pandora-skills"
]

[agents.toil.harness]
kind = "pi"
model = "openai-codex/gpt-5.4:high"
system_prompt_mode = "append"
argv.add = [
  "--name", "Toil",
  "--agent", "main",
  "--skill", "$PDX_USER_DATA_DIR/toil-skills"
]

[agents.greed.harness]
kind = "pi"
model = "openai-codex/gpt-5.5:low"
system_prompt_mode = "append"
argv.add = [
  "--name", "Greed",
  "--agent", "main",
  "--emote", "red",
  "--skill", "$PDX_USER_DATA_DIR/greed-skills"
]

[agents.war.harness]
kind = "pi"
model = "openai-codex/gpt-5.4:high"
system_prompt_mode = "append"
argv.add = [
  "--name", "War",
  "--agent", "main"
]

[agents.envy.harness]
kind = "pi"
model = "openai-codex/gpt-5.4:medium"
system_prompt_mode = "append"
argv.add = [
  "--name", "Envy",
  "--agent", "main",
  "--extension", "$PDX_USER_DATA_DIR/envy-plugin",
]

#: }}}
#: rules {{{

[[rules]]
path_glob = "~/work/**"
policy.add = ["work-perkbox"]
agents.pandora.harness.argv.add = ["--skill", "/Users/adamhall/work/me/workfiles/pdx/pandora-skills"]
agents.toil.policy.add = ["work-repo-default-branch-guard"]
agents.greed.policy.add = ["work-repo-default-branch-guard"]
agents.envy.policy.add = ["work-envy-glab-triage"]
agents.greed.harness.model = "anthropic/claude-opus-4-6:high"

[[rules]]
path_glob = "~/pb/**"
policy.add = ["work-perkbox"]
agents.pandora.harness.argv.add = ["--skill", "/Users/adamhall/work/me/workfiles/pdx/pandora-skills"]
agents.toil.policy.add = ["work-repo-default-branch-guard"]
agents.greed.policy.add = ["work-repo-default-branch-guard"]
agents.envy.policy.add = ["work-envy-glab-triage"]
agents.greed.harness.model = "anthropic/claude-opus-4-6:high"

#: }}}
